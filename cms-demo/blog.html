<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog 文章 Demo | HM 华美服务中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="blog">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html">
        <img src="../images/brand/huamei-logo.webp" alt="HM 华美服务中心">
        <div>
          <div class="brand-title">华美 Blog</div>
          <div class="brand-sub">Policy & Application Guides</div>
        </div>
      </a>
      <nav class="nav-actions" aria-label="演示导航">
        <a class="nav-link" href="admin.html">后台 Demo</a>
        <a class="nav-link" href="apartments.html">公寓更新</a>
        <a class="btn primary" href="../index.html#contact">咨询梅老师</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <h1 class="display">申请攻略与政策解读</h1>
        <p>Blog 用来发布长期内容，例如材料准备、申请流程、政策解释和案例说明。它和公寓更新共用同一个后台，但公开页面分开展示。</p>
      </div>
      <aside class="hero-panel">
        <div class="metric-row">
          <div class="metric"><strong>攻略</strong><span>材料准备</span></div>
          <div class="metric"><strong>政策</strong><span>福利解读</span></div>
          <div class="metric"><strong>案例</strong><span>客户教育</span></div>
        </div>
      </aside>
    </section>

    <section aria-label="Blog 列表">
      <div class="panel-head" style="border:0; padding:.2rem 0 1rem;">
        <h2 id="resultCount" class="panel-title">0 篇公开文章</h2>
      </div>
      <div id="contentList" class="cards-grid"></div>
    </section>
  </main>

  <script type="module" src="public.js"></script>
</body>
</html>
