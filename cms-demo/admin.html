<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HM 内容后台 | 华美服务中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-theme">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html">
        <img src="../images/brand/huamei-logo.webp" alt="HM 华美服务中心">
        <div>
          <div class="brand-title">HM · Huamei CMS</div>
          <div class="brand-sub">内容发布后台</div>
        </div>
      </a>
      <nav class="nav-actions" aria-label="演示导航">
        <a class="nav-link" href="published-apartments.html">已发布公寓</a>
        <a class="nav-link" href="/apartments">客户公寓页</a>
        <a class="nav-link" href="/blog" data-local-blog>客户 Blog 页</a>
        <a class="btn primary" href="../index.html#contact">回到官网</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <h1 class="display">内容发布后台</h1>
        <p>团队成员可以在这里发布公寓更新和 Blog 文章。上线前在本地演示，正式部署后会保存到网站后台。</p>
      </div>
      <aside class="hero-panel" aria-label="内容统计">
        <div id="backendMode" class="backend-mode">
          <strong>本地演示</strong>
          <span>内容只保存在这台电脑的这个浏览器里。</span>
        </div>
        <div id="contentStats" class="metric-row"></div>
      </aside>
    </section>

    <section class="admin-grid" aria-label="内容管理">
      <aside class="panel">
        <div class="panel-head">
          <h2 class="panel-title">内容列表</h2>
          <button class="btn ghost" id="resetDemo" type="button">重置演示数据</button>
        </div>
        <div class="panel-head">
          <button class="btn sage" id="newApartment" type="button">新增公寓</button>
          <button class="btn ghost" id="newBlog" type="button">新增 Blog</button>
        </div>
        <input id="entrySearch" class="input entry-search" type="search" placeholder="搜索标题 / 编号 / 城市">
        <div id="entryList" class="entry-list" aria-label="已有内容"></div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">编辑内容</h2>
          <div class="editor-state">
            <span id="editorMode" class="badge dark"></span>
            <span id="metaLine" class="badge"></span>
          </div>
        </div>
        <form class="editor-form" onsubmit="return false;">
          <div class="form-grid">
            <label class="field">
              <span class="label">内容类型</span>
              <select id="entryType" class="select">
                <option value="apartment">公寓更新</option>
                <option value="blog">Blog 文章</option>
              </select>
            </label>
            <label class="field full">
              <span class="label">标题 <em class="req" title="必填">*</em></span>
              <input id="title" class="input" type="text" placeholder="例如：San Gabriel 62+ 长者公寓抽签开放">
            </label>
            <input id="contentStatus" type="hidden" value="draft">
          </div>

          <div id="apartmentFields" class="form-grid three" style="margin-top:1rem;">
            <label class="field">
              <span class="label">公寓编号 <em class="req" title="必填">*</em></span>
              <input id="apartmentNumber" class="input" type="number" inputmode="numeric" min="1" placeholder="例如：395">
              <span class="field-note">填写内部数字编号即可，不需要手写英文网址。</span>
            </label>
            <label class="field">
              <span class="label">城市</span>
              <input id="city" class="input" type="text" placeholder="例如：San Gabriel / Irvine">
              <span class="field-note">建议填写：客户按城市找房，搜索引擎也按城市收录。</span>
            </label>
            <label class="field">
              <span class="label">地区</span>
              <select id="region" class="select">
                <option value="south">南加州</option>
                <option value="north">北加州</option>
                <option value="outside">外州</option>
              </select>
            </label>
            <label class="field">
              <span class="label">年龄要求</span>
              <select id="ageRequirement" class="select">
                <option>18+</option>
                <option>55+</option>
                <option>62+</option>
              </select>
            </label>
            <input id="applicationStatus" type="hidden">
            <label class="field">
              <span class="label">列表置顶</span>
              <label class="check-chip field-toggle">
                <input id="isPinned" type="checkbox">
                <span>置顶这条公寓</span>
              </label>
              <span class="field-note">可同时置顶多条，公开列表会优先展示所有置顶公寓。</span>
            </label>
            <div class="field full">
              <span class="label">房型 <em class="req" title="必填">*</em></span>
              <div id="roomTypes" class="check-grid"></div>
            </div>
            <div class="field full">
              <span class="label">标签</span>
              <div id="tags" class="check-grid"></div>
            </div>
          </div>

          <div id="blogFields" class="form-grid" style="margin-top:1rem;" hidden>
            <label class="field">
              <span class="label">文章分类</span>
              <select id="blogCategory" class="select">
                <option>申请攻略</option>
                <option>政策解读</option>
                <option>材料准备</option>
                <option>案例说明</option>
              </select>
            </label>
            <label class="field">
              <span class="label">作者 / 发布机构</span>
              <input id="authorName" class="input" type="text" value="华美服务中心" placeholder="例如：华美服务中心">
              <span class="field-note">请只填写真实、可核实的作者或审核机构。</span>
            </label>
            <label class="field">
              <span class="label">内容审核人 / 机构</span>
              <input id="reviewerName" class="input" type="text" placeholder="例如：华美服务中心">
              <span class="field-note">选填；填写后会显示在“来源与更新”模块，不影响发布。</span>
            </label>
            <label class="field">
              <span class="label">最后审核日期</span>
              <input id="lastReviewedAt" class="input" type="date">
              <span class="field-note">选填；适合政策文章记录最近核对日期，不影响发布。</span>
            </label>
            <label class="field full">
              <span class="label">适用范围</span>
              <textarea id="applicability" class="textarea" rows="2" maxlength="260" placeholder="例如：美国联邦 Housing Choice Voucher 一般规则；具体以当地 PHA 当前政策为准。"></textarea>
              <span class="field-note">选填；有明确地区或项目范围时再填写。</span>
            </label>
            <label class="field full">
              <span class="label">主要官方来源</span>
              <textarea id="sourceUrls" class="textarea" rows="4" placeholder="每行一个 https:// 官方链接"></textarea>
              <span class="field-note">选填；有可靠的一手链接时建议填写，不影响发布。</span>
            </label>
            <label class="field full">
              <span class="label">公开地址 Slug <em class="req" title="必填">*</em></span>
              <input id="slug" class="input" type="text" inputmode="url" placeholder="例如：section-8-application-guide">
              <span id="slugHelp" class="field-note">仅使用小写英文、数字和短横线；发布后尽量不再修改。</span>
            </label>
            <label class="field full">
              <span class="label">列表摘要</span>
              <textarea id="summary" class="textarea" rows="3" maxlength="220" placeholder="用 1-2 句话说明这篇文章解决什么问题"></textarea>
            </label>
            <label class="field full">
              <span class="label">SEO 标题</span>
              <input id="seoTitle" class="input" type="text" maxlength="90" placeholder="简洁、唯一，包含主要搜索问题">
            </label>
            <label class="field full">
              <span class="label">SEO 描述</span>
              <textarea id="seoDescription" class="textarea" rows="3" maxlength="220" placeholder="准确概括正文，让搜索用户知道点开后能获得什么"></textarea>
            </label>
          </div>

          <div class="form-grid" style="margin-top:1rem;">
            <label class="field">
              <span class="label">内容图片</span>
              <input id="coverFile" class="input" type="file" accept="image/*" multiple>
              <span class="field-note">可一次上传多张，第一张作为列表封面；上传时会自动压缩，并优先转成更小的 WebP 图片。</span>
            </label>
            <label class="field">
              <span class="label">封面图片说明（Alt）</span>
              <input id="coverAlt" class="input" type="text" placeholder="准确描述画面，不堆叠关键词">
              <span class="field-note">帮助读屏软件和搜索引擎理解图片内容。</span>
            </label>
            <div class="field full">
              <span class="label">图片预览</span>
              <div id="coverPreview" class="cover-preview"></div>
            </div>
          </div>

          <div class="field full" style="margin-top:1rem;">
            <span class="label">正文富文本</span>
            <span class="field-note" style="margin-bottom:6px;">从小红书 / 微信粘贴会自动清理格式，保留加粗、列表、链接。</span>
            <div class="toolbar" aria-label="富文本工具栏">
              <button type="button" data-command="formatBlock" data-value="h2">H2</button>
              <button type="button" data-command="bold">B</button>
              <button type="button" data-command="insertUnorderedList">列表</button>
              <button type="button" data-command="createLink">链接</button>
              <button type="button" data-command="removeFormat">清除格式</button>
            </div>
            <div id="bodyEditor" class="editor" contenteditable="true" aria-label="正文编辑器"></div>
          </div>

          <div class="form-actions">
            <div class="nav-actions">
              <button id="saveDraft" class="btn ghost" type="button">保存草稿</button>
              <button id="publish" class="btn sage" type="button">发布</button>
              <button id="preview" class="btn ghost" type="button">预览页面</button>
              <button id="archive" class="btn danger" type="button">下架</button>
              <details id="moreActions" class="more-actions">
                <summary>更多操作</summary>
                <div class="more-actions__body">
                  <button id="permanentDelete" class="btn danger" type="button">永久删除</button>
                </div>
              </details>
            </div>
          </div>
        </form>
      </section>
    </section>
  </main>

  <div id="deleteConfirmDialog" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle" hidden>
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <h2 id="deleteConfirmTitle">永久删除内容</h2>
          <p id="deleteConfirmText">这条内容删除后无法恢复。</p>
        </div>
      </div>
      <label class="field">
        <span class="label">请输入确认文字</span>
        <input id="deleteConfirmInput" class="input" type="text" autocomplete="off">
        <span id="deleteConfirmExpected" class="field-note"></span>
      </label>
      <div class="modal-actions">
        <button id="deleteConfirmCancel" class="btn ghost" type="button">取消</button>
        <button id="deleteConfirmSubmit" class="btn danger solid" type="button">确认永久删除</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="admin.js"></script>
<button id="fabNew" class="fab-new" type="button" aria-label="新增公寓">＋ 新增公寓</button>
</body>
</html>
