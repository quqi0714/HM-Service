<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公寓房源更新 Demo | HM 华美服务中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="apartments">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../index.html">
        <img src="../images/brand/huamei-logo.webp" alt="HM 华美服务中心">
        <div>
          <div class="brand-title">华美公寓房源更新</div>
          <div class="brand-sub">Apartment Updates Demo</div>
        </div>
      </a>
      <nav class="nav-actions" aria-label="演示导航">
        <a class="nav-link" href="admin.html">后台 Demo</a>
        <a class="nav-link" href="blog.html">Blog</a>
        <a class="btn primary" href="../index.html#contact">咨询梅老师</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <h1 class="display">当前公寓更新</h1>
        <p>这里模拟未来发给客户的公开列表页。客户可以按南北加州、年龄要求和房型筛选，已满或过期内容也会保留页面并清楚标记状态。</p>
      </div>
      <aside class="hero-panel">
        <div class="metric-row">
          <div class="metric"><strong>2</strong><span>公开示例</span></div>
          <div class="metric"><strong>3</strong><span>筛选维度</span></div>
          <div class="metric"><strong>SEO</strong><span>动态页面</span></div>
        </div>
      </aside>
    </section>

    <section aria-label="公寓筛选">
      <div class="filter-bar">
        <input id="query" class="input" type="search" placeholder="搜索标题、标签或摘要">
        <select id="region" class="select" aria-label="地区">
          <option value="">全部地区</option>
          <option value="south">南加州</option>
          <option value="north">北加州</option>
          <option value="outside">外州</option>
        </select>
        <div class="filter-chip-row" aria-label="年龄筛选">
          <span class="filter-chip-title">年龄</span>
          <button class="filter-chip is-active" type="button" data-filter="ageRequirement" data-value="">全部年龄</button>
          <button class="filter-chip" type="button" data-filter="ageRequirement" data-value="18+">18+</button>
          <button class="filter-chip" type="button" data-filter="ageRequirement" data-value="55+">55+</button>
          <button class="filter-chip" type="button" data-filter="ageRequirement" data-value="62+">62+</button>
        </div>
        <div class="filter-chip-row" aria-label="房型筛选">
          <span class="filter-chip-title">房型</span>
          <button class="filter-chip is-active" type="button" data-filter="roomType" data-value="">全部房型</button>
          <button class="filter-chip" type="button" data-filter="roomType" data-value="1B">1B</button>
          <button class="filter-chip" type="button" data-filter="roomType" data-value="2B">2B</button>
          <button class="filter-chip" type="button" data-filter="roomType" data-value="3B">3B</button>
          <button class="filter-chip" type="button" data-filter="roomType" data-value="3B+">3B+</button>
        </div>
      </div>
      <div class="panel-head" style="border:0; padding:.2rem 0 1rem;">
        <h2 id="resultCount" class="panel-title">0 条公开房源更新</h2>
      </div>
      <div id="contentList" class="cards-grid"></div>
    </section>
  </main>

  <script type="module" src="public.js"></script>
</body>
</html>
