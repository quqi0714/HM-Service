name = "huameihope"
compatibility_date = "2026-06-30"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "HM_CMS_DB"
database_name = "huamei-cms"
database_id = "f7aabed2-5f3a-40fb-973d-dba7fb033509"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "HM_CMS_ASSETS"
bucket_name = "huamei-cms-assets"

[vars]
SITE_ORIGIN = "https://huameihope.com"
SITE_NAME = "HM 华美服务中心"
# CMS_ADMIN_EMAILS、CF_ACCESS_AUD、CF_ACCESS_TEAM_DOMAIN 在 Cloudflare Pages 后台配置。
